<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Furnitech — Upload Model</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
    }

    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }

    .subtitle { font-size: 14px; color: #8b949e; margin-bottom: 32px; }

    label { display: block; font-size: 13px; font-weight: 500; color: #8b949e; margin-bottom: 6px; }

    input[type="text"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 20px;
    }
    input[type="text"]:focus { border-color: #58a6ff; }

    .file-zone {
      border: 2px dashed #30363d;
      border-radius: 8px;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 24px;
      position: relative;
    }
    .file-zone:hover, .file-zone.drag-over { border-color: #58a6ff; background: rgba(88,166,255,0.04); }
    .file-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .file-icon { font-size: 32px; margin-bottom: 8px; }
    .file-label { font-size: 14px; color: #8b949e; }
    .file-label span { color: #58a6ff; font-weight: 500; }
    .file-name { font-size: 13px; color: #3fb950; margin-top: 8px; font-weight: 500; }

    button[type="submit"] {
      width: 100%;
      background: #238636;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button[type="submit"]:hover:not(:disabled) { background: #2ea043; }
    button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

    #progress-section { display: none; margin-top: 24px; }
    .progress-bar-track { background: #21262d; border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 8px; }
    .progress-bar-fill { height: 100%; background: #58a6ff; border-radius: 4px; width: 0%; transition: width 0.4s; }
    .progress-status { font-size: 13px; color: #8b949e; text-align: center; }

    #result-section { display: none; margin-top: 24px; border-top: 1px solid #21262d; padding-top: 24px; }
    .result-title { font-size: 15px; font-weight: 600; color: #3fb950; margin-bottom: 20px; }
    .qr-container { background: #fff; border-radius: 8px; padding: 16px; display: flex; justify-content: center; margin-bottom: 20px; }
    .qr-container svg { max-width: 200px; height: auto; }

    .link-box {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .link-box a { color: #58a6ff; font-size: 13px; text-decoration: none; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .copy-btn { background: #21262d; border: 1px solid #30363d; border-radius: 4px; color: #8b949e; font-size: 12px; padding: 4px 10px; cursor: pointer; white-space: nowrap; }
    .copy-btn:hover { color: #e6edf3; }

    .reset-btn {
      width: 100%;
      background: transparent;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 13px;
      padding: 9px;
      cursor: pointer;
      margin-top: 8px;
    }
    .reset-btn:hover { border-color: #58a6ff; color: #e6edf3; }

    .error-msg {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 6px;
      color: #f85149;
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 16px;
      display: none;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Upload Furniture Model</h1>
    <p class="subtitle">GLB file → AR link + QR code → Google Sheets</p>

    <form id="upload-form">
      <label for="name">Furniture Name</label>
      <input type="text" id="name" placeholder="e.g. Oslo Sofa" required>

      <label for="sku">SKU</label>
      <input type="text" id="sku" placeholder="e.g. SOF-001" required>

      <label>GLB File</label>
      <div class="file-zone" id="file-zone">
        <input type="file" id="file-input" accept=".glb">
        <div class="file-icon">📦</div>
        <div class="file-label">Drop GLB here or <span>browse</span></div>
        <div class="file-name" id="file-name"></div>
      </div>

      <button type="submit" id="submit-btn">Upload Model</button>
      <div class="error-msg" id="error-msg"></div>
    </form>

    <div id="progress-section">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-status" id="progress-status">Starting...</div>
    </div>

    <div id="result-section">
      <div class="result-title">✓ Model uploaded successfully</div>
      <div class="qr-container" id="qr-container"></div>
      <div class="link-box">
        <a href="#" id="ar-link" target="_blank"></a>
        <button class="copy-btn" onclick="copyLink()">Copy</button>
      </div>
      <button class="reset-btn" onclick="resetForm()">Upload another model</button>
    </div>
  </div>

  <script>
    const form = document.getElementById('upload-form');
    const fileInput = document.getElementById('file-input');
    const fileZone = document.getElementById('file-zone');
    const fileNameEl = document.getElementById('file-name');
    const submitBtn = document.getElementById('submit-btn');
    const progressSection = document.getElementById('progress-section');
    const progressFill = document.getElementById('progress-fill');
    const progressStatus = document.getElementById('progress-status');
    const resultSection = document.getElementById('result-section');
    const errorMsg = document.getElementById('error-msg');
    let currentArUrl = '';

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) fileNameEl.textContent = fileInput.files[0].name;
    });

    fileZone.addEventListener('dragover', (e) => { e.preventDefault(); fileZone.classList.add('drag-over'); });
    fileZone.addEventListener('dragleave', () => fileZone.classList.remove('drag-over'));
    fileZone.addEventListener('drop', (e) => {
      e.preventDefault();
      fileZone.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f && f.name.toLowerCase().endsWith('.glb')) {
        const dt = new DataTransfer();
        dt.items.add(f);
        fileInput.files = dt.files;
        fileNameEl.textContent = f.name;
      }
    });

    function setProgress(pct, status) {
      progressFill.style.width = pct + '%';
      progressStatus.textContent = status;
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    async function uploadToBlob(file) {
      // Step 1: get client token from our endpoint
      const tokenRes = await fetch('/api/blob-token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'blob.generate-client-token',
          payload: { pathname: file.name, clientPayload: null, multipart: false }
        })
      });
      if (!tokenRes.ok) {
        const err = await tokenRes.json().catch(() => ({}));
        throw new Error(err.error || 'Failed to get upload token');
      }
      const { clientToken } = await tokenRes.json();

      // Step 2: PUT file directly to Vercel Blob using the client token
      const blobRes = await fetch(`https://vercel.com/api/blob/?pathname=${encodeURIComponent(file.name)}`, {
        method: 'PUT',
        headers: {
          'authorization': `Bearer ${clientToken}`,
          'x-api-version': '12',
          'x-access': 'public',
          'x-content-type': 'model/gltf-binary',
        },
        body: file,
      });
      if (!blobRes.ok) {
        const text = await blobRes.text();
        throw new Error(`Blob upload failed (${blobRes.status}): ${text}`);
      }
      const blobData = await blobRes.json();
      return blobData.url;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const name = document.getElementById('name').value.trim();
      const sku = document.getElementById('sku').value.trim();
      const file = fileInput.files[0];

      if (!name || !sku || !file) {
        showError('Please fill in all fields and select a GLB file.');
        return;
      }

      submitBtn.disabled = true;
      progressSection.style.display = 'block';
      setProgress(20, 'Uploading GLB...');

      try {
        const blobUrl = await uploadToBlob(file);
        setProgress(75, 'Generating QR code...');

        const res = await fetch('/api/finalize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, sku, blobUrl }),
        });
        const data = await res.json();
        if (!res.ok || !data.success) throw new Error(data.error || 'Finalize failed');

        setProgress(100, 'Done');
        currentArUrl = data.arUrl;
        document.getElementById('qr-container').innerHTML = data.qrSvg;
        const arLink = document.getElementById('ar-link');
        arLink.href = data.arUrl;
        arLink.textContent = data.arUrl;
        progressSection.style.display = 'none';
        resultSection.style.display = 'block';
      } catch (err) {
        progressSection.style.display = 'none';
        submitBtn.disabled = false;
        showError(err.message);
      }
    });

    function copyLink() {
      navigator.clipboard.writeText(currentArUrl).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 2000);
      });
    };

    window.resetForm = () => {
      form.reset();
      fileNameEl.textContent = '';
      resultSection.style.display = 'none';
      submitBtn.disabled = false;
      currentArUrl = '';
    };
  </script>
</body>
</html>
